services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nutri_erp
      POSTGRES_USER: nutri
      POSTGRES_PASSWORD: nutri123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutri -d nutri_erp"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://nutri:nutri123@postgres:5432/nutri_erp
      JWT_SECRET: nutri-erp-super-secret-key-change-in-production-2026
      JWT_EXPIRATION: 8h
      PORT: "4000"
    ports:
      - "4000:4000"
    restart: on-failure:3
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
